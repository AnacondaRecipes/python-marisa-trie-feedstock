{% set name = "marisa-trie" %}
{% set version = "1.4.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|replace("-", "_") }}-{{ version }}.tar.gz
  sha256: 20dd1a9035c5cb225c6eeb8e516ebced9497bf0b48d60e9b556f38d8cdf76df8

build:
  number: 0
  skip: true  # [py<39]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - python
    - pip
    - setuptools >=77.0
    - cython >=3.1.3
  run:
    - python
  run-constrained:
    - hypothesis >=6.136.9  # [py>=313]

test:
  source_files:
    - tests
  imports:
    - marisa_trie
  requires:
    - pip
    - pytest
    - hypothesis
    - readme_renderer
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -ra -vv tests  # [unix]
    - pytest -ra -vv tests -k "not (test_map or test_mmap or test_saveload)"  # [win]

about:
  home: https://github.com/pytries/marisa-trie
  license: MIT AND (BSD-2-Clause OR LGPL-2.1-or-later)
  license_family: Other
  license_file:
    - LICENSE
    - marisa-trie/COPYING.md
  summary: Static memory-efficient and fast Trie-like structures for Python
  description: |
    Static memory-efficient Trie-like structures for Python (3.9+)
    based on marisa-trie C++ library.
    String data in a MARISA-trie may take up to 50x-100x less memory than
    in a standard Python dict; the raw lookup speed is comparable; trie also
    provides fast advanced methods like prefix search.
  dev_url: https://github.com/pytries/marisa-trie
  doc_url: https://marisa-trie.readthedocs.io

extra:
  recipe-maintainers:
    - kmike
    - superbobry
    - mariusvniekerk
